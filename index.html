<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Anonymizer — Sagan Passport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #f5f2ed;
      --bg-card: #ffffff;
      --bg-input: #f5f3f0;
      --border: #e3ded8;
      --text: #093a3e;
      --text-dim: #6b7264;
      --accent: #2197ff;
      --accent-hover: #1a7fd9;
      --accent-glow: rgba(33,151,255,0.12);
      --green: #5ce3b0;
      --red: #ff7455;
      --yellow: #f5b800;
      --white: #ffffff;
      --radius: 10px;
      --dark-teal: #093a3e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ─── TOP BAR ─── */
    .topbar {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000;
    }
    .topbar-brand {
      display: flex; align-items: center; gap: 12px;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 700; font-size: 15px; color: var(--dark-teal);
    }
    .topbar-brand img { height: 22px; }
    .topbar-badge {
      background: rgba(9,58,62,0.08); color: var(--dark-teal);
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 100px; letter-spacing: 0.05em;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 8px; border: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { background: var(--accent-hover); box-shadow: 0 4px 12px var(--accent-glow); }
    .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green { background: var(--dark-teal); color: #ffffff; font-weight: 700; }
    .btn-green:hover { background: #0b4a4f; }
    .btn-green:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: #999; color: var(--text); background: var(--bg-input); }
    .btn-red { background: var(--red); color: white; }
    .btn-red:hover { background: #e5623d; }
    .btn svg { width: 16px; height: 16px; }

    /* ─── LAYOUT ─── */
    .app { display: flex; height: calc(100vh - 56px); }

    .sidebar {
      width: 440px; min-width: 440px;
      background: #ffffff;
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .preview-area {
      flex: 1; overflow-y: auto;
      background: var(--bg);
      padding: 32px;
      display: flex; justify-content: center;
    }

    /* ─── SIDEBAR SECTIONS ─── */
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); margin-bottom: 12px;
    }

    /* ─── DROP ZONE ─── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg-input);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(33,151,255,0.04);
    }
    .drop-zone-icon { font-size: 36px; margin-bottom: 12px; }
    .drop-zone-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .drop-zone-sub { font-size: 12px; color: var(--text-dim); }

    .file-loaded {
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .file-info { display: flex; align-items: center; gap: 10px; }
    .file-icon { font-size: 20px; }
    .file-name { font-weight: 600; font-size: 13px; }
    .file-size { font-size: 11px; color: var(--text-dim); }
    .file-remove { background: none; border: none; cursor: pointer; color: var(--red); font-size: 18px; padding: 4px; }

    /* ─── STATUS ─── */
    .status-bar {
      background: var(--bg-input);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 12px; color: var(--text-dim);
      display: flex; align-items: center; gap: 10px;
    }
    .status-bar.processing { border-left: 3px solid var(--accent); }
    .status-bar.success { border-left: 3px solid var(--green); color: var(--text); }
    .status-bar.error { border-left: 3px solid var(--red); color: var(--red); }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── PII REVIEW ─── */
    .pii-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
    .pii-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
    }
    .pii-item-left { display: flex; align-items: center; gap: 8px; }
    .pii-type {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(255,116,85,0.12); color: var(--red);
    }
    .pii-value { font-family: 'Space Grotesk', monospace; font-size: 12px; color: var(--text); }
    .pii-toggle {
      width: 32px; height: 18px;
      border-radius: 9px; border: none;
      background: var(--red); cursor: pointer;
      position: relative; transition: background 0.2s;
    }
    .pii-toggle.keep { background: var(--green); }
    .pii-toggle::after {
      content: '';
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%; background: white;
      transition: transform 0.2s;
    }
    .pii-toggle.keep::after { transform: translateX(14px); }

    /* ─── ACTIONS ─── */
    .action-group { display: flex; flex-direction: column; gap: 8px; }

    /* ─── PREVIEW ─── */
    .preview-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-dim); text-align: center;
      height: 100%; gap: 12px;
    }
    .preview-empty-icon { font-size: 48px; opacity: 0.4; }
    .preview-empty-text { font-size: 14px; max-width: 280px; line-height: 1.6; }

    .resume-preview {
      background: white;
      width: 100%; max-width: 800px;
      min-height: 1000px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 48px;
      font-size: 14px;
      line-height: 1.65;
      color: #2d3748;
    }
    .resume-preview h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 700;
      color: var(--dark-teal);
      margin-bottom: 4px;
    }
    .resume-subtitle {
      font-size: 13px; color: var(--text-dim);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--dark-teal);
    }
    .resume-section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--dark-teal);
      margin: 28px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .resume-preview p { margin-bottom: 10px; }
    .resume-preview ul { padding-left: 20px; margin-bottom: 10px; }
    .resume-preview li { margin-bottom: 6px; }
    .exp-entry { margin-bottom: 18px; }
    .exp-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .exp-role-title { font-weight: 700; color: var(--dark-teal); font-size: 14px; }
    .exp-dates { font-size: 12px; color: var(--text-dim); }
    .exp-company-name { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
    .skills-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-tag {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
      background: rgba(9,58,62,0.06); color: var(--dark-teal);
    }
    .redacted {
      background: var(--red);
      color: white;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .watermark {
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      opacity: 0.6;
    }

    /* ─── PRINT STYLES ─── */
    @media print {
      body { background: white; }
      .topbar, .sidebar { display: none !important; }
      .app { display: block; height: auto; }
      .preview-area { padding: 0; background: white; }
      .resume-preview { box-shadow: none; border-radius: 0; max-width: 100%; padding: 32px 40px; }
      .watermark { display: none; }
    }

    @media (max-width: 900px) {
      .app { flex-direction: column; height: auto; }
      .sidebar { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      .preview-area { min-height: 80vh; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <img src="https://saganrecruitment.com/wp-content/uploads/2025/10/Sagan-Logo-2-e1759568299542.png" alt="Sagan" />
      <span>Resume Anonymizer</span>
      <span class="topbar-badge">Passport</span>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="resetAll()" title="Start over">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
        Reset
      </button>
    </div>
  </div>

  <div class="app">
    <div class="sidebar">

      <!-- FILE UPLOAD -->
      <div>
        <div class="section-title">Upload Resume</div>
        <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()">
          <div class="drop-zone-icon">📄</div>
          <div class="drop-zone-title">Drop a PDF here or click to browse</div>
          <div class="drop-zone-sub">Accepts .pdf files up to 10 MB</div>
        </div>
        <div id="fileLoaded" class="file-loaded" style="display:none;">
          <div class="file-info">
            <span class="file-icon">📄</span>
            <div>
              <div class="file-name" id="fileName"></div>
              <div class="file-size" id="fileSize"></div>
            </div>
          </div>
          <button class="file-remove" onclick="removeFile()" title="Remove">✕</button>
        </div>
        <input type="file" id="fileInput" accept=".pdf" style="display:none;" onchange="handleFile(this.files[0])" />
      </div>

      <!-- STATUS -->
      <div id="statusSection" style="display:none;">
        <div id="statusBar" class="status-bar">
          <div class="spinner"></div>
          <span id="statusText">Processing...</span>
        </div>
      </div>

      <!-- PII REVIEW -->
      <div id="piiSection" style="display:none;">
        <div class="section-title">Detected PII <span style="font-weight:400;text-transform:none;letter-spacing:0;">— toggle to keep</span></div>
        <div id="piiList" class="pii-list"></div>
      </div>

      <!-- ACTIONS -->
      <div id="actionSection" style="display:none;">
        <div class="section-title">Actions</div>
        <div class="action-group">
          <button class="btn btn-green" onclick="reRender()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-11.36L1 10"/></svg>
            Re-render with changes
          </button>
          <button class="btn btn-accent" onclick="exportPDF()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export as PDF
          </button>
        </div>
      </div>

      <!-- PROCESS BUTTON -->
      <div id="processSection">
        <button class="btn btn-green" id="processBtn" onclick="processResume()" disabled style="width:100%;justify-content:center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Anonymize Resume
        </button>
      </div>

    </div>

    <div class="preview-area">
      <div id="previewEmpty" class="preview-empty">
        <div class="preview-empty-icon">🛡️</div>
        <div class="preview-empty-text">Upload a PDF resume and click "Anonymize" to see the cleaned version here.</div>
      </div>
      <div id="resumePreview" class="resume-preview" style="display:none;"></div>
    </div>
  </div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ─── API KEY (obfuscated, same pattern as builders) ───
  const _ak = [115,107,45,97,110,116,45,97,112,105,48,51,45,113,72,72,80,109,57,89,72,118,100,56,79,114,100,76,99,52,65,78,75,111,54,109,70,109,70,77,88,53,98,55,78,69,56,54,76,80,67,68,120,66,83,71,115,90,67,114,54,117,72,83,88,82,104,45,114,102,111,69,57,111,54,113,99,104,76,106,95,54,118,97,78,72,109,80,70,106,98,71,108,98,102,48,118,73,119,45,95,111,102,49,54,65,65,65];
  function _ak_get() { return _ak.map(c => String.fromCharCode(c)).join(''); }

  let loadedFile = null;
  let extractedText = '';
  let piiItems = [];
  let structuredResume = null;

  // ─── FILE HANDLING ───
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') handleFile(f);
  });

  function handleFile(file) {
    if (!file || file.type !== 'application/pdf') return;
    if (file.size > 10 * 1024 * 1024) { alert('File too large. Max 10 MB.'); return; }
    loadedFile = file;
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(0) + ' KB';
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('fileLoaded').style.display = 'flex';
    updateProcessBtn();
  }

  function removeFile() {
    loadedFile = null;
    extractedText = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('dropZone').style.display = '';
    document.getElementById('fileLoaded').style.display = 'none';
    document.getElementById('piiSection').style.display = 'none';
    document.getElementById('actionSection').style.display = 'none';
    document.getElementById('statusSection').style.display = 'none';
    document.getElementById('previewEmpty').style.display = '';
    document.getElementById('resumePreview').style.display = 'none';
    updateProcessBtn();
  }

  function updateProcessBtn() {
    document.getElementById('processBtn').disabled = !loadedFile;
  }

  // ─── PDF TEXT EXTRACTION ───
  async function extractTextFromPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const strings = content.items.map(item => item.str);
      fullText += strings.join(' ') + '\n\n';
    }
    return fullText;
  }

  // ─── CLAUDE API CALL ───
  async function callClaude(systemPrompt, userMessage) {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': _ak_get(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMessage }]
      })
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error('API error: ' + resp.status + ' — ' + err);
    }
    const data = await resp.json();
    return data.content[0].text;
  }

  // ─── MAIN PROCESS ───
  async function processResume() {
    if (!loadedFile) return;

    showStatus('processing', 'Extracting text from PDF...');
    document.getElementById('piiSection').style.display = 'none';
    document.getElementById('actionSection').style.display = 'none';

    try {
      // Step 1: Extract text
      extractedText = await extractTextFromPDF(loadedFile);
      if (!extractedText.trim()) throw new Error('Could not extract text from this PDF. It may be image-based.');

      // Step 2: Send to Claude for PII detection + structuring
      showStatus('processing', 'Detecting PII and structuring resume...');

      const systemPrompt = `You are a resume anonymizer. You will receive raw text extracted from a resume PDF. Your job is twofold:

1. DETECT ALL PII that should be redacted. PII includes:
   - Email addresses
   - Phone numbers (any format)
   - Physical addresses (street addresses, full address lines with zip codes)
   - LinkedIn URLs or any social media profile URLs
   - Personal websites or portfolio URLs
   - Any other direct contact information

   Do NOT flag as PII:
   - The person's name (keep it, but return ONLY their first name in the "name" field — drop last name, middle name, suffixes)
   - Company names (keep them)
   - Job titles (keep them)
   - Dates (keep them)
   - Cities/countries when used as location context (e.g. "Based in Colombia" or "Guatemala City" as a location label is fine to keep)
   - Education institutions (keep them)

2. STRUCTURE the resume into clean JSON format.

Return ONLY valid JSON in this exact format:
{
  "name": "First Name Only",
  "headline": "One-line professional headline",
  "pii": [
    { "type": "email", "value": "person@email.com" },
    { "type": "phone", "value": "+1 555-123-4567" },
    { "type": "linkedin", "value": "linkedin.com/in/person" },
    { "type": "address", "value": "123 Main St, City, State 12345" }
  ],
  "summary": "Professional summary paragraph",
  "experience": [
    {
      "title": "Job Title",
      "company": "Company Name",
      "dates": "Start - End",
      "bullets": ["Achievement 1", "Achievement 2"]
    }
  ],
  "education": [
    {
      "degree": "Degree Name",
      "institution": "School Name",
      "date": "Year or date range"
    }
  ],
  "skills": ["Skill 1", "Skill 2", "Skill 3"],
  "languages": ["Language 1 - proficiency level", "Language 2"],
  "certifications": ["Cert 1"]
}

If a section is empty or not found, use an empty array. Always return valid JSON only, no markdown fences.`;

      const result = await callClaude(systemPrompt, extractedText);

      // Parse JSON
      let cleaned = result.trim();
      if (cleaned.startsWith('```')) cleaned = cleaned.replace(/^```json?\n?/, '').replace(/\n?```$/, '');
      structuredResume = JSON.parse(cleaned);

      // Step 3: Show PII for review
      piiItems = (structuredResume.pii || []).map(p => ({ ...p, redact: true }));
      renderPiiList();
      document.getElementById('piiSection').style.display = '';
      document.getElementById('actionSection').style.display = '';

      // Step 4: Render preview
      renderPreview();

      const piiCount = piiItems.filter(p => p.redact).length;
      showStatus('success', 'Done. Found ' + piiCount + ' PII item' + (piiCount !== 1 ? 's' : '') + ' to redact. Review below, then export.');

    } catch (err) {
      showStatus('error', err.message);
      console.error(err);
    }
  }

  // ─── STATUS ───
  function showStatus(type, msg) {
    const section = document.getElementById('statusSection');
    const bar = document.getElementById('statusBar');
    section.style.display = '';
    bar.className = 'status-bar ' + type;
    if (type === 'processing') {
      bar.innerHTML = '<div class="spinner"></div><span>' + msg + '</span>';
    } else {
      const icon = type === 'success' ? '✓' : '✕';
      bar.innerHTML = '<span style="font-weight:700;">' + icon + '</span><span>' + msg + '</span>';
    }
  }

  // ─── PII LIST ───
  function renderPiiList() {
    const list = document.getElementById('piiList');
    if (!piiItems.length) {
      list.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:8px;">No contact information detected.</div>';
      return;
    }
    list.innerHTML = piiItems.map((p, i) => `
      <div class="pii-item">
        <div class="pii-item-left">
          <span class="pii-type">${escHtml(p.type)}</span>
          <span class="pii-value">${escHtml(p.value)}</span>
        </div>
        <button class="pii-toggle ${p.redact ? '' : 'keep'}" onclick="togglePii(${i})" title="${p.redact ? 'Will be redacted' : 'Will be kept'}"></button>
      </div>
    `).join('');
  }

  function togglePii(idx) {
    piiItems[idx].redact = !piiItems[idx].redact;
    renderPiiList();
  }

  // ─── RENDER PREVIEW ───
  function renderPreview() {
    if (!structuredResume) return;
    const r = structuredResume;
    document.getElementById('previewEmpty').style.display = 'none';
    const preview = document.getElementById('resumePreview');
    preview.style.display = '';

    let html = '';

    // Name + headline
    html += '<h1>' + escHtml(r.name || 'Candidate') + '</h1>';
    if (r.headline) html += '<div class="resume-subtitle">' + escHtml(r.headline) + '</div>';

    // Summary
    if (r.summary) {
      html += '<div class="resume-section-title">Professional Summary</div>';
      html += '<p>' + anonymizeText(escHtml(r.summary)) + '</p>';
    }

    // Experience
    if (r.experience && r.experience.length) {
      html += '<div class="resume-section-title">Professional Experience</div>';
      r.experience.forEach(exp => {
        html += '<div class="exp-entry">';
        html += '<div class="exp-header"><span class="exp-role-title">' + escHtml(exp.title) + '</span><span class="exp-dates">' + escHtml(exp.dates || '') + '</span></div>';
        if (exp.company) html += '<div class="exp-company-name">' + escHtml(exp.company) + '</div>';
        if (exp.bullets && exp.bullets.length) {
          html += '<ul>';
          exp.bullets.forEach(b => { html += '<li>' + anonymizeText(escHtml(b)) + '</li>'; });
          html += '</ul>';
        }
        html += '</div>';
      });
    }

    // Education
    if (r.education && r.education.length) {
      html += '<div class="resume-section-title">Education</div>';
      r.education.forEach(ed => {
        html += '<div class="exp-entry">';
        html += '<div class="exp-header"><span class="exp-role-title">' + escHtml(ed.degree) + '</span><span class="exp-dates">' + escHtml(ed.date || '') + '</span></div>';
        if (ed.institution) html += '<div class="exp-company-name">' + escHtml(ed.institution) + '</div>';
        html += '</div>';
      });
    }

    // Skills
    if (r.skills && r.skills.length) {
      html += '<div class="resume-section-title">Skills</div>';
      html += '<div class="skills-tags">';
      r.skills.forEach(s => { html += '<span class="skill-tag">' + escHtml(s) + '</span>'; });
      html += '</div>';
    }

    // Languages
    if (r.languages && r.languages.length) {
      html += '<div class="resume-section-title">Languages</div>';
      html += '<div class="skills-tags">';
      r.languages.forEach(l => { html += '<span class="skill-tag">' + escHtml(l) + '</span>'; });
      html += '</div>';
    }

    // Certifications
    if (r.certifications && r.certifications.length) {
      html += '<div class="resume-section-title">Certifications</div>';
      html += '<ul>';
      r.certifications.forEach(c => { html += '<li>' + escHtml(c) + '</li>'; });
      html += '</ul>';
    }

    html += '<div class="watermark">Anonymized by Sagan Passport · Resume Anonymizer</div>';

    preview.innerHTML = html;
  }

  function anonymizeText(text) {
    let result = text;
    piiItems.forEach(p => {
      if (p.redact) {
        const escaped = escRegex(escHtml(p.value));
        result = result.replace(new RegExp(escaped, 'gi'), '<span class="redacted">REDACTED</span>');
      }
    });
    return result;
  }

  function reRender() {
    renderPreview();
    showStatus('success', 'Preview updated with your changes.');
  }

  // ─── EXPORT PDF ───
  function exportPDF() {
    const name = structuredResume ? structuredResume.name || 'Resume' : 'Resume';
    const cleanName = name.replace(/[^a-zA-Z0-9 ]/g, '').trim().replace(/\s+/g, '_');
    document.title = cleanName + '_Anonymized';
    window.print();
    setTimeout(() => { document.title = 'Resume Anonymizer — Sagan Passport'; }, 1000);
  }

  // ─── RESET ───
  function resetAll() {
    removeFile();
    structuredResume = null;
    piiItems = [];
    document.getElementById('processSection').style.display = '';
  }

  // ─── UTILS ───
  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ─── INIT ───
  updateProcessBtn();
</script>

</body>
</html>
